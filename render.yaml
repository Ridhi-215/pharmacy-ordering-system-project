services:
  # 1. Backend Web Service (Spring Boot Docker)
  - type: web
    name: pharmacy-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: 8080
      # Database connection variables (Defaults to empty; backend falls back to H2 automatically)
      - key: DB_URL
        value: ""
      - key: DB_USERNAME
        value: ""
      - key: DB_PASSWORD
        value: ""
      # Dynamically generate a secure 256-bit random JWT secret key on deployment
      - key: JWT_SECRET
        generateValue: true
      # Pass the frontend URL dynamically to the backend for CORS
      - key: FRONTEND_URL
        fromService:
          type: web
          name: pharmacy-frontend
          property: host
      # SMTP Dev Settings (can be overridden in Render dashboard)
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        value: your-email@gmail.com
      - key: MAIL_PASSWORD
        value: your-app-password

  # 2. Frontend Static Site (React + Vite)
  - type: web
    name: pharmacy-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # Pass the backend public URL to the build environment
    envVars:
      - key: VITE_API_URL
        value: https://pharmacy-backend-423r.onrender.com
    # Redirect rules to route all paths back to index.html (supports react-router-dom)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
